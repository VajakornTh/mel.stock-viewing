<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Market Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://tailwindcss.com"></script>
    <!-- Chart.js for data visualization -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">

    <!-- Navigation Bar -->
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-indigo-400 flex items-center gap-2">
            📊 EquityPulse
        </h1>
        <div class="flex gap-4">
            <span class="text-sm text-gray-400">Market Status: <span class="text-green-400 font-semibold">Open</span></span>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Left & Center: Chart and Stats -->
        <div class="lg:col-span-2 space-y-6">
            
            <!-- Stock Overview Header -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-bold" id="stockName">Apple Inc. (AAPL)</h2>
                    <p class="text-gray-400 text-sm">NASDAQ • Real-time Price</p>
                </div>
                <div class="text-right">
                    <div class="text-3xl font-extrabold text-green-400" id="stockPrice">$175.40</div>
                    <div class="text-sm text-green-400 font-medium" id="stockChange">+1.24 (0.71%) Today</div>
                </div>
            </div>

            <!-- Chart Container -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold text-gray-300">Price Performance</h3>
                    <span class="text-xs bg-gray-700 text-gray-300 px-2.5 py-1 rounded">Live Feed</span>
                </div>
                <div class="relative h-80">
                    <canvas id="stockChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Right: Watchlist / Market Movers -->
        <div class="space-y-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h3 class="text-lg font-bold mb-4 text-indigo-300">Trending Watchlist</h3>
                <div class="divide-y divide-gray-700">
                    <!-- Item 1 -->
                    <div class="py-3 flex justify-between items-center cursor-pointer hover:bg-gray-750 transition" onclick="updateDashboard('AAPL', 'Apple Inc.', 175.40, 1.24, [172, 173, 171, 174, 173, 175])">
                        <div>
                            <div class="font-bold">AAPL</div>
                            <div class="text-xs text-gray-400">Apple Inc.</div>
                        </div>
                        <div class="text-right">
                            <div class="font-semibold">$175.40</div>
                            <div class="text-xs text-green-400">+0.71%</div>
                        </div>
                    </div>
                    <!-- Item 2 -->
                    <div class="py-3 flex justify-between items-center cursor-pointer hover:bg-gray-750 transition" onclick="updateDashboard('TSLA', 'Tesla Inc.', 242.60, -3.15, [250, 248, 246, 243, 245, 242])">
                        <div>
                            <div class="font-bold">TSLA</div>
                            <div class="text-xs text-gray-400">Tesla Inc.</div>
                        </div>
                        <div class="text-right">
                            <div class="font-semibold">$242.60</div>
                            <div class="text-xs text-red-400">-1.28%</div>
                        </div>
                    </div>
                    <!-- Item 3 -->
                    <div class="py-3 flex justify-between items-center cursor-pointer hover:bg-gray-750 transition" onclick="updateDashboard('NVDA', 'NVIDIA Corp.', 485.20, 12.40, [460, 465, 472, 470, 480, 485])">
                        <div>
                            <div class="font-bold">NVDA</div>
                            <div class="text-xs text-gray-400">NVIDIA Corp.</div>
                        </div>
                        <div class="text-right">
                            <div class="font-semibold">$485.20</div>
                            <div class="text-xs text-green-400">+2.62%</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- JavaScript for Chart Initialization and Dynamic Updates -->
    <script>
        let chart;

        // Initialize the Chart
        const ctx = document.getElementById('stockChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['9:30 AM', '10:30 AM', '11:30 AM', '12:30 PM', '1:30 PM', '2:30 PM'],
                datasets: [{
                    label: 'Price (USD)',
                    data: [172, 173, 171, 174, 173, 175],
                    borderColor: '#818cf8',
                    backgroundColor: 'rgba(129, 140, 248, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { color: 'rgba(255,255,255,0.05)' },分配: 'text' },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' } }
                }
            }
        });

        // Function to dynamically update the UI when clicking on a watchlist item
        function updateDashboard(ticker, name, price, change, historicalData) {
            document.getElementById('stockName').innerText = `${name} (${ticker})`;
            document.getElementById('stockPrice').innerText = `$${price.toFixed(2)}`;
            
            const changeEl = document.getElementById('stockChange');
            if (change >= 0) {
                changeEl.innerText = `+${change.toFixed(2)} Today`;
                changeEl.className = "text-sm text-green-400 font-medium";
            } else {
                changeEl.innerText = `${change.toFixed(2)} Today`;
                changeEl.className = "text-sm text-red-400 font-medium";
            }

            // Update chart data points
            chart.data.datasets[0].data = historicalData;
            chart.update();
        }
    </script>
</body>
</html>
